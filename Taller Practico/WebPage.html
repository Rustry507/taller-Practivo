<!DOCTYPE html>
<html lang="">
<head>
    <title>Login</title>

    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial,serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background-color: #222;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            background: #333;
            border: none;
            color: white;
            border-radius: 5px;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #444;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #666;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Ingresar a cuenta</h2>

    <label for="username"></label><input type="text" id="username" placeholder="Usuario">
    <label for="password"></label><input type="password" id="password" placeholder="Contrasena">

    <button onclick="login()">Ingresar</button>

    <p id="resultado"></p>
</div>

<script>
    function login() {
        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;

        fetch("http://127.0.0.1:5000/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password
            })
        })
            .then(res => res.json())
            .then(data => {
                document.getElementById("resultado").innerText = data.message;

                if (data.message === "Login correcto") {
                    setTimeout(() => {
                        window.location.href = "http://127.0.0.1:5000/dashboard";
                    }, 500);

                }
            })
            .catch(() => {
                document.getElementById("resultado").innerText = "Error de conexion";
            });
    }
</script>

</body>
</html>
