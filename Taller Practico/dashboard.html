<!DOCTYPE html>
<html lang="">
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial,serif;
            background-color: #111;
            color: white;
            display: flex;
        }

        .sidebar {
            width: 200px;
            background-color: #000;
            height: 100vh;
            padding: 20px;
        }

        .sidebar button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            background: #222;
            border: none;
            color: white;
            cursor: pointer;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            width: 150px;
            text-align: center;
        }

    </style>
</head>

<body>

<div class="sidebar">
    <h3>Menu</h3>
    <button onclick="cargar()">Ver agenda</button>
    <button onclick="cerrar()">Salir</button>
</div>

<div class="main">

    <h2>Agenda del dia</h2>

    <h3>Agregar expediente</h3>

    <div id="contenedor"></div>

    <button onclick="toggleForm()">+ Agregar expediente</button>

    <div id="formulario" style="display:none; margin-top:20px;">

        <h3>Nuevo expediente</h3>

        <label for="cliente"></label><input id="cliente" placeholder="Cliente"><br><br>
        <label for="aseguradora"></label><input id="aseguradora" placeholder="Aseguradora"><br><br>
        <label for="juzgado"></label><input id="juzgado" placeholder="Juzgado"><br><br>
        <label for="estado"></label><input id="estado" placeholder="Estado"><br><br>
        <label for="fecha"></label><input id="fecha" placeholder="Fecha"><br><br>

        <button onclick="crear()">Guardar expediente</button>

    </div>


        <div class="cards">
        <div class="card" id="pendientes">Pendientes: 0</div>
        <div class="card" id="total">Total: 0</div>
        </div>


</div>

<script>




    function cargar() {
        fetch("http://127.0.0.1:5000/expedientes")
            .then(res => res.json())
            .then(data => {

                let contenedor = document.getElementById("contenedor");
                contenedor.innerHTML = "";

                let pendientes = 0;

                data.forEach(exp => {

                    if (exp.estado === "Pendiente") {
                        pendientes++;
                    }

                    let div = document.createElement("div");
                    div.className = "card";
                    div.style.width = "auto";
                    div.style.textAlign = "left";
                    div.style.margin = "10px 0";

                    div.innerHTML = `
                    <b>Cliente:</b> ${exp.cliente} <br>
                    <b>Aseguradora:</b> ${exp.aseguradora} <br>
                    <b>Juzgado:</b> ${exp.juzgado} <br>
                    <b>Estado:</b> ${exp.estado} <br>
                    <b>Fecha:</b> ${exp.fecha} <br><br>
                `;

                    let btnEditar = document.createElement("button");
                    btnEditar.innerText = "Editar";
                    btnEditar.onclick = function() {
                        editar(exp);
                    };

                    let btnEliminar = document.createElement("button");
                    btnEliminar.innerText = "Eliminar";
                    btnEliminar.style.marginLeft = "10px";
                    btnEliminar.onclick = function() {
                        eliminar(exp.id);
                    };

                    div.appendChild(btnEditar);
                    div.appendChild(btnEliminar);

                    contenedor.appendChild(div);
                });

                document.getElementById("pendientes").innerText =
                    "Pendientes: " + pendientes;

                document.getElementById("total").innerText =
                    "Total: " + data.length;
            });
    }

    function crear() {

        let cliente = document.getElementById("cliente").value;
        let aseguradora = document.getElementById("aseguradora").value;
        let juzgado = document.getElementById("juzgado").value;
        let estado = document.getElementById("estado").value;
        let fecha = document.getElementById("fecha").value;

        fetch("http://127.0.0.1:5000/expedientes", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                cliente: cliente,
                aseguradora: aseguradora,
                juzgado: juzgado,
                estado: estado,
                fecha: fecha
            })
        })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                cargar();
            });
    }

    function editar(exp) {
        let nuevoCliente = prompt("Nuevo cliente:", exp.cliente);
        let nuevaAseguradora = prompt("Nueva aseguradora:", exp.aseguradora);
        let nuevoJuzgado = prompt("Nuevo juzgado:", exp.juzgado);
        let nuevoEstado = prompt("Nuevo estado:", exp.estado);
        let nuevaFecha = prompt("Nueva fecha:", exp.fecha);

        fetch("http://127.0.0.1:5000/expedientes/" + exp.id, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                cliente: nuevoCliente,
                aseguradora: nuevaAseguradora,
                juzgado: nuevoJuzgado,
                estado: nuevoEstado,
                fecha: nuevaFecha
            })
        })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                cargar();
            });
    }


    function eliminar(id) {
        let confirmar = confirm("Seguro que deseas eliminar este expediente?");

        if (confirmar) {
            fetch("http://127.0.0.1:5000/expedientes/" + id, {
                method: "DELETE"
            })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    cargar();
                });
        }
    }


    function toggleForm() {
        let form = document.getElementById("formulario");

        if (form.style.display === "none") {
            form.style.display = "block";
        } else {
            form.style.display = "none";
        }
    }

    document.getElementById("formulario").style.display = "none";

    function cerrar() {
        window.location.href = "http://127.0.0.1:5000/";
    }


</script>

</body>
</html>
